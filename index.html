<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SIREV Primaria</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
    --azul:#003b71;
    --azul-2:#005daa;
    --azul-3:#0b73c8;
    --azul-claro:#e9f4ff;
    --azul-suave:#f5faff;
    --rojo:#c8102e;
    --dorado:#f2a900;
    --texto:#10233f;
    --texto-2:#4a6078;
    --borde:#c9d9ea;
    --fondo:#f4f8fc;
    --blanco:#ffffff;
    --sombra:0 14px 36px rgba(0,59,113,.14);
    --sombra-suave:0 8px 22px rgba(0,59,113,.09);
    --radio:18px;
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
    min-height:100vh;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:
        radial-gradient(circle at top left,rgba(0,93,170,.13),transparent 34rem),
        linear-gradient(180deg,#f8fbff 0%,#edf4fb 100%);
    color:var(--texto);
}
button{font:inherit}

/* =============================
   ENCABEZADO
   ============================= */
.site-header{
    background:linear-gradient(135deg,#ffffff 0%,#f2f8ff 50%,#dfefff 100%);
    border-bottom:1px solid rgba(0,59,113,.14);
    box-shadow:0 8px 24px rgba(0,59,113,.10);
}
.header-inner{
    max-width:1480px;
    margin:0 auto;
    padding:1.25rem 1.25rem 1rem;
    display:grid;
    grid-template-columns:auto 1fr auto;
    gap:1.15rem;
    align-items:center;
}
.logo-card{
    width:86px;
    height:86px;
    border-radius:22px;
    background:linear-gradient(145deg,#fff,#edf6ff);
    border:1px solid rgba(0,59,113,.16);
    box-shadow:var(--sombra-suave);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}
.logo-card img{
    width:100%;
    height:100%;
    object-fit:contain;
    padding:9px;
}
.brand-kicker{
    display:inline-flex;
    align-items:center;
    gap:.45rem;
    color:var(--azul-2);
    font-size:.84rem;
    font-weight:850;
    letter-spacing:.05em;
    text-transform:uppercase;
    margin-bottom:.18rem;
}
.brand-kicker::before{
    content:"";
    width:9px;
    height:9px;
    background:var(--rojo);
    border-radius:50%;
    box-shadow:0 0 0 4px rgba(200,16,46,.10);
}
.title-main{
    font-size:clamp(2.1rem,4.1vw,3.35rem);
    line-height:.98;
    font-weight:950;
    letter-spacing:-.055em;
    color:var(--azul);
}
.title-sub{
    margin-top:.42rem;
    color:#0b4f88;
    font-size:clamp(.95rem,1.5vw,1.1rem);
    font-weight:750;
    line-height:1.35;
}
.title-sub span{display:block;color:#10233f;font-weight:700}
.year-pill{
    justify-self:end;
    display:inline-flex;
    align-items:center;
    gap:.55rem;
    background:#fff;
    color:var(--azul);
    border:1px solid rgba(0,59,113,.16);
    padding:.68rem 1rem;
    border-radius:999px;
    font-size:.92rem;
    font-weight:850;
    box-shadow:var(--sombra-suave);
    white-space:nowrap;
}
.year-pill::before{
    content:"Año escolar";
    color:var(--texto-2);
    font-weight:700;
}

/* =============================
   NAVEGACIÓN
   ============================= */
.nav-band{
    background:linear-gradient(90deg,var(--azul),#004f92);
    border-top:1px solid rgba(255,255,255,.24);
}
.nav-inner{
    max-width:1480px;
    margin:0 auto;
    padding:.9rem 1.25rem;
    display:flex;
    align-items:center;
    gap:.7rem;
    flex-wrap:wrap;
}
.dropdown{position:relative}
.nav-btn{
    min-height:44px;
    display:inline-flex;
    align-items:center;
    gap:.55rem;
    padding:.74rem 1.05rem;
    border-radius:14px;
    cursor:pointer;
    border:1px solid rgba(255,255,255,.28);
    background:rgba(255,255,255,.11);
    color:#fff;
    font-weight:850;
    box-shadow:0 8px 22px rgba(0,23,51,.16);
    transition:transform .12s ease,background .12s ease,border-color .12s ease;
}
.nav-btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.42)}
.nav-btn.primary{background:#fff;color:var(--azul);border-color:#fff}
.nav-btn .chev{font-size:.85rem;opacity:.86}
.dropdown-content{
    display:none;
    position:absolute;
    top:calc(100% + 8px);
    left:0;
    min-width:290px;
    background:#fff;
    border:1px solid var(--borde);
    border-radius:16px;
    box-shadow:0 18px 44px rgba(0,43,84,.20);
    overflow:hidden;
    z-index:1000;
}
.dropdown-content.show{display:block}
.dropdown-content button,
.dropdown-content span{
    display:flex;
    width:100%;
    align-items:center;
    justify-content:space-between;
    gap:1rem;
    padding:13px 15px;
    border:none;
    background:#fff;
    color:var(--texto);
    text-align:left;
    cursor:pointer;
    font-weight:750;
    border-bottom:1px solid #edf2f7;
}
.dropdown-content button:last-child,.dropdown-content span:last-child{border-bottom:0}
.dropdown-content button:hover{background:var(--azul-claro);color:var(--azul)}
.dropdown-content span{color:#98a6b5;cursor:default}
.nav-spacer{flex:1}
.quick-note{
    color:#eaf5ff;
    font-size:.88rem;
    font-weight:700;
    opacity:.92;
    white-space:nowrap;
}

/* =============================
   MAIN
   ============================= */
main{
    max-width:1480px;
    margin:0 auto;
    padding:1rem 1.25rem 1.6rem;
}
.resource-card{
    background:#fff;
    border:1px solid var(--borde);
    border-radius:var(--radio);
    box-shadow:var(--sombra-suave);
    margin-bottom:1rem;
    overflow:hidden;
}
.resource-head{
    display:grid;
    grid-template-columns:1fr auto;
    gap:1rem;
    align-items:center;
    padding:1rem 1.1rem;
    border-left:6px solid var(--rojo);
}
.resource-title-wrap{min-width:0}
.resource-eyebrow{
    display:inline-flex;
    align-items:center;
    gap:.42rem;
    color:var(--azul-2);
    font-size:.78rem;
    font-weight:850;
    text-transform:uppercase;
    letter-spacing:.06em;
    margin-bottom:.2rem;
}
.resource-eyebrow::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--dorado)}
.resource-head h2{
    color:var(--azul);
    font-size:1.12rem;
    font-weight:900;
    letter-spacing:-.015em;
}
.resource-head p{
    margin-top:.25rem;
    color:var(--texto-2);
    font-size:.94rem;
    line-height:1.4;
}
.status-pill{
    display:inline-flex;
    align-items:center;
    gap:.48rem;
    padding:.64rem .86rem;
    border-radius:999px;
    background:var(--azul-claro);
    color:var(--azul);
    border:1px solid var(--borde);
    font-size:.88rem;
    font-weight:850;
    white-space:nowrap;
}
.status-pill::before{content:"";width:8px;height:8px;background:var(--rojo);border-radius:50%}
.report-container{
    width:100%;
    min-height:0;
    background:#fff;
    border-radius:var(--radio);
    overflow:hidden;
    box-shadow:var(--sombra);
    border:1px solid var(--borde);
    position:relative;
}
.report-container::before{
    content:"";
    position:absolute;
    inset:0 0 auto 0;
    height:4px;
    background:linear-gradient(90deg,var(--azul),var(--rojo),var(--dorado));
    z-index:2;
}
iframe{
    width:100%;
    height:720px;
    min-height:0;
    border:none;
    display:block;
    background:#fff;
}
.footer{
    text-align:center;
    color:#52667a;
    font-size:.9rem;
    margin:1.25rem 0 .6rem;
}
.footer strong{color:var(--azul)}

@media(max-width:900px){
    .header-inner{grid-template-columns:auto 1fr;align-items:center}
    .year-pill{grid-column:1 / -1;justify-self:start}
    .nav-inner{display:grid;grid-template-columns:1fr;gap:.6rem}
    .dropdown,.nav-btn{width:100%}
    .nav-btn{justify-content:space-between}
    .nav-spacer,.quick-note{display:none}
    .resource-head{grid-template-columns:1fr}
    .status-pill{justify-self:start}
    iframe{min-height:640px;height:75vh}
}
@media(max-width:560px){
    .header-inner{grid-template-columns:1fr;text-align:center}
    .logo-card{margin:0 auto;width:76px;height:76px}
    .brand-kicker{justify-content:center}
    .year-pill{justify-self:center}
    main{padding:.9rem .8rem 1.3rem}
}
</style>
</head>

<body>
<header class="site-header">
    <div class="header-inner">
        <div class="logo-card" aria-label="Logo del Ministerio de Educación">
            <img src="logominerd.jpeg" alt="Logo del Ministerio de Educación" onerror="this.parentElement.style.display='none'">
        </div>

        <div class="brand-block">
            <div class="brand-kicker">Sistema de Resultados de Evaluaciones del Nivel Primario</div>
            <h1 class="title-main">SIREV Primaria</h1>
            <div class="title-sub">
                Ministerio de Educación · Viceministerio de Servicios Técnicos y Pedagógicos
                <span>Dirección de Educación Primaria</span>
            </div>
        </div>

        <div class="year-pill"><span id="anioActualTexto">2025-2026</span></div>
    </div>

    <nav class="nav-band" aria-label="Navegación principal de SIREV Primaria">
        <div class="nav-inner">
            <div class="dropdown">
                <button class="nav-btn" onclick="toggleMenu('menuAnio', event)">Año escolar <span class="chev">▼</span></button>
                <div id="menuAnio" class="dropdown-content">
                    <button onclick="seleccionarAnio('2025-2026')">2025-2026</button>
                    <button onclick="seleccionarAnio('2026-2027')">2026-2027</button>
                </div>
            </div>

            <div class="dropdown">
                <button class="nav-btn primary" onclick="toggleMenu('menuDashboards', event)">Dashboards <span class="chev">▼</span></button>
                <div id="menuDashboards" class="dropdown-content">
                    <button onclick="abrirDashboard('sirevInteractivo')">Dashboard interactivo SIREV</button>
                    <button onclick="abrirDashboard('powerbi')">Informe Power BI</button>
                </div>
            </div>

            <div class="dropdown">
                <button class="nav-btn" onclick="toggleMenu('menuPruebas', event)">Pruebas y rúbricas <span class="chev">▼</span></button>
                <div id="menuPruebas" class="dropdown-content">
                    <button onclick="abrirRecurso('pruebas','septiembre')">Septiembre</button>
                    <button onclick="abrirRecurso('pruebas','noviembre')">Noviembre</button>
                    <button onclick="abrirRecurso('pruebas','marzo')">Marzo</button>
                    <button onclick="abrirRecurso('pruebas','mayo')">Mayo</button>
                </div>
            </div>

            <div class="dropdown">
                <button class="nav-btn" onclick="toggleMenu('menuSistematizacion', event)">Sistematización <span class="chev">▼</span></button>
                <div id="menuSistematizacion" class="dropdown-content">
                    <button onclick="abrirRecurso('sistematizacion','septiembre')">Septiembre</button>
                    <button onclick="abrirRecurso('sistematizacion','noviembre')">Noviembre</button>
                    <button onclick="abrirRecurso('sistematizacion','marzo')">Marzo</button>
                    <button onclick="abrirRecurso('sistematizacion','mayo')">Mayo</button>
                </div>
            </div>

            <div class="dropdown">
                <button class="nav-btn" onclick="toggleMenu('menuFormularios', event)">Registro de resultados <span class="chev">▼</span></button>
                <div id="menuFormularios" class="dropdown-content">
                    <button onclick="abrirFormulario('primerCiclo')">Primer ciclo</button>
                    <button onclick="abrirFormulario('segundoCiclo')">Segundo ciclo</button>
                </div>
            </div>

            <div class="nav-spacer"></div>
        </div>
    </nav>
</header>

<main>
    <div class="report-container full-focus">
        <iframe id="visorInforme" title="Visor SIREV Primaria" src="dashboard_sirev_primaria_v41.html"></iframe>
    </div>
</main>

<footer class="footer">
    © 2026 Ministerio de Educación – Desarrollado por <strong>Aneudy Minier</strong>
</footer>

<script>
const datosPorAnio = {
    "2025-2026": {
        informe: "https://app.powerbi.com/view?r=eyJrIjoiZWE0NjFhYWYtY2M5ZS00ZDQ4LWFiZDAtNmU1ZGZkYTVjNWViIiwidCI6IjY2ZTI4OThiLTJjMzUtNDMzZi1hNzUzLWJkNjRhY2EzOWFmYiIsImMiOjF9",
        dashboard: "dashboard_sirev_primaria_v41.html",
        pruebas: {
            septiembre: "https://drive.google.com/drive/folders/1DVgvr8SuIApyFKk2kQUaZjy2c736xGZh",
            noviembre: "https://drive.google.com/drive/folders/1mHf3_gLi4ZIj_YLRPB0-CYh0b_Y1CMWV",
            marzo: "https://drive.google.com/drive/folders/1JP1DCceZfuHuNL4FxIySqalPvCh36SAb",
            mayo: ""
        },
        sistematizacion: {
            septiembre: "https://lookerstudio.google.com/reporting/8b050392-1c17-4511-be16-64a07323885e",
            noviembre: "https://lookerstudio.google.com/reporting/60bb48a6-a3df-45d9-ae1f-2a2272081fe4",
            marzo: "https://lookerstudio.google.com/reporting/37283302-62a8-4a76-836d-2e484c186884",
            mayo: ""
        },
        formularios: {
            primerCiclo: "https://aminier06.github.io/formularioprimerciclo/",
            segundoCiclo: "https://aminier06.github.io/formulariosegundociclo/"
        }
    },
    "2026-2027": {
        informe: "",
        dashboard: "",
        pruebas: {},
        sistematizacion: {},
        formularios: {}
    }
};

let anioSeleccionado = "2025-2026";
let dashboardActual = "sirevInteractivo";

function seleccionarAnio(anio) {
    anioSeleccionado = anio;
    document.getElementById("anioActualTexto").textContent = anio;
    if (dashboardActual === "sirevInteractivo") abrirDashboard("sirevInteractivo");
    else abrirDashboard("powerbi");

    cerrarMenus();
}

function abrirDashboard(tipo) {
    dashboardActual = tipo;
    const visor = document.getElementById("visorInforme");
    const quickNote = document.getElementById("quickNote");
    let url = "";

    if (tipo === "sirevInteractivo") {
        url = datosPorAnio[anioSeleccionado].dashboard;
        quickNote.textContent = "Dashboard interactivo · datos consolidados";
    } else {
        url = datosPorAnio[anioSeleccionado].informe;
        quickNote.textContent = "Informe general · Power BI";
    }

    if (url) { visor.src = url; setTimeout(ajustarAltoVisor, 500); }
    else {
        visor.src = "about:blank";
        alert("Este recurso no está disponible todavía para el año escolar seleccionado.");
    }

    cerrarMenus();
}

function abrirRecurso(tipo, mes) {
    const url = datosPorAnio[anioSeleccionado][tipo]?.[mes];
    if (url) window.open(url, "_blank");
    else alert("Recurso no disponible para este año escolar.");
    cerrarMenus();
}

function abrirFormulario(ciclo) {
    const url = datosPorAnio[anioSeleccionado].formularios?.[ciclo];
    if (url) window.open(url, "_blank");
    else alert("Formulario no disponible para este año escolar.");
    cerrarMenus();
}

function toggleMenu(id, e) {
    e.stopPropagation();
    const menu = document.getElementById(id);
    const estabaAbierto = menu.classList.contains("show");
    cerrarMenus();
    if (!estabaAbierto) menu.classList.add("show");
}

function cerrarMenus() {
    document.querySelectorAll(".dropdown-content").forEach(menu => menu.classList.remove("show"));
}


function ajustarAltoVisor() {
    const iframe = document.getElementById("visorInforme");
    if (!iframe) return;
    try {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        if (!doc || !doc.body) return;

        // Evita el espacio en blanco circular: si se mide con un iframe muy alto,
        // el documento interno puede reportar ese mismo alto como scrollHeight.
        const y = window.scrollY;
        iframe.style.height = "1px";

        requestAnimationFrame(() => {
            const candidates = [
                doc.body.scrollHeight,
                doc.documentElement.scrollHeight,
                doc.body.offsetHeight,
                doc.documentElement.offsetHeight
            ].filter(Number.isFinite);

            const h = Math.max(...candidates, 620);
            iframe.style.height = (h + 8) + "px";
            iframe.style.minHeight = "0";
            iframe.scrolling = "no";
            window.scrollTo(window.scrollX, y);
        });
    } catch (e) {
        iframe.style.height = "720px";
        iframe.style.minHeight = "0";
    }
}

let resizeObserverSirev = null;
const visorSirev = document.getElementById("visorInforme");
if (visorSirev) {
    visorSirev.addEventListener("load", () => {
        ajustarAltoVisor();
        setTimeout(ajustarAltoVisor, 300);
        setTimeout(ajustarAltoVisor, 900);
        setTimeout(ajustarAltoVisor, 1800);

        try {
            const doc = visorSirev.contentDocument || visorSirev.contentWindow.document;
            if (resizeObserverSirev) resizeObserverSirev.disconnect();
            resizeObserverSirev = new ResizeObserver(() => ajustarAltoVisor());
            resizeObserverSirev.observe(doc.body);
        } catch (e) {}
    });
}
window.addEventListener("resize", ajustarAltoVisor);

document.addEventListener("click", cerrarMenus);
</script>
</body>
</html>
