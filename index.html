<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SIREV Primaria</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background-color: #f3f6f9;
    color: #1f2937;
}

header.membrete {
    background: linear-gradient(180deg, #dceeff 0%, #cfe8ff 100%);
    border-bottom: 4px solid #004578;
    padding: 1.6rem 1rem 1.2rem;
}

.header-inner {
    max-width: 1200px;
    margin: 0 auto;
}

.titulo-sistema {
    font-weight: 800;
    color: #003366;
}

.titulo-linea1 {
    font-size: 1.35rem;
}

.titulo-linea2 {
    font-size: 1.9rem;
    font-weight: 900;
    letter-spacing: 0.5px;
    margin-top: 2px;
}

.subtitulo-inst {
    font-size: 1.05rem;
    font-weight: 600;
    color: #004a80;
}

.dependencia {
    font-size: 1rem;
    font-weight: 600;
}

.acciones {
    max-width: 1200px;
    margin: 1rem auto 0;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}

.btn {
    font-weight: 700;
    font-size: 0.95rem;
    padding: 0.7rem 1.3rem;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid #004578;
    background: #004578;
    color: #fff;
}

.btn:hover {
    background: #005a9e;
}

.dropdown {
    position: relative;
}

.dropdown-content {
    display: none;
    position: absolute;
    background: #fff;
    min-width: 260px;
    border-radius: 8px;
    box-shadow: 0 6px 14px rgba(0,0,0,0.12);
    margin-top: 6px;
    z-index: 1000;
}

.dropdown-content.show {
    display: block;
}

.dropdown-content button,
.dropdown-content span {
    display: block;
    width: 100%;
    padding: 12px;
    background: #fff;
    border: none;
    text-align: left;
    font: inherit;
    font-weight: 600;
    color: #1f2937;
    cursor: pointer;
}

.dropdown-content button:hover {
    background: #f0f4f8;
}

.dropdown-content span {
    color: #9ca3af;
    cursor: default;
}

.selector-actual {
    max-width: 1200px;
    margin: 0.8rem auto 0;
    font-size: 0.95rem;
    font-weight: 600;
    color: #003366;
}

main {
    padding: 1.5rem;
}

.report-container {
    aspect-ratio: 16/9;
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

.footer {
    text-align: center;
    font-size: 0.9rem;
    color: #4b5563;
    margin: 2rem 0 1rem;
}
</style>
</head>

<body>

<header class="membrete">
<div class="header-inner">

<div class="titulo-sistema">
    <div class="titulo-linea1">
        Sistema de Resultados de Evaluaciones del Nivel Primario
    </div>
    <div class="titulo-linea2">
        SIREV Primaria
    </div>
</div>

<div class="subtitulo-inst">Ministerio de Educación</div>
<div class="subtitulo-inst">Viceministerio de Servicios Técnicos y Pedagógicos</div>
<div class="dependencia">Dirección de Educación Primaria</div>

</div>

<div class="acciones">

<!-- AÑO -->
<div class="dropdown">
<button class="btn" onclick="toggleMenu('menuAnio', event)">Año escolar ▼</button>
<div id="menuAnio" class="dropdown-content">
<button onclick="seleccionarAnio('2025-2026')">2025-2026</button>
<button onclick="seleccionarAnio('2026-2027')">2026-2027</button>
</div>
</div>

<!-- PRUEBAS -->
<div class="dropdown">
<button class="btn" onclick="toggleMenu('menuPruebas', event)">Pruebas y rúbricas ▼</button>
<div id="menuPruebas" class="dropdown-content">
<button onclick="abrirRecurso('pruebas','septiembre')">Septiembre</button>
<button onclick="abrirRecurso('pruebas','noviembre')">Noviembre</button>
<button onclick="abrirRecurso('pruebas','marzo')">Marzo</button>
<button onclick="abrirRecurso('pruebas','mayo')">Mayo</button>
</div>
</div>

<!-- SISTEMATIZACIÓN -->
<div class="dropdown">
<button class="btn" onclick="toggleMenu('menuSistematizacion', event)">Sistematización ▼</button>
<div id="menuSistematizacion" class="dropdown-content">
<button onclick="abrirRecurso('sistematizacion','septiembre')">Septiembre</button>
<button onclick="abrirRecurso('sistematizacion','noviembre')">Noviembre</button>
<button onclick="abrirRecurso('sistematizacion','marzo')">Marzo</button>
<button onclick="abrirRecurso('sistematizacion','mayo')">Mayo</button>
</div>
</div>

<!-- FORMULARIOS -->
<div class="dropdown">
<button class="btn" onclick="toggleMenu('menuFormularios', event)">Formularios ▼</button>
<div id="menuFormularios" class="dropdown-content">
<button onclick="abrirFormulario('primerCiclo')">Primer ciclo</button>
<button onclick="abrirFormulario('segundoCiclo')">Segundo ciclo</button>
</div>
</div>

</div>

<div class="selector-actual">
Año escolar seleccionado: <span id="anioActualTexto">2025-2026</span>
</div>

</header>

<main>
<div class="report-container">
<iframe id="visorInforme"
src="https://app.powerbi.com/view?r=eyJrIjoiZWE0NjFhYWYtY2M5ZS00ZDQ4LWFiZDAtNmU1ZGZkYTVjNWViIiwidCI6IjY2ZTI4OThiLTJjMzUtNDMzZi1hNzUzLWJkNjRhY2EzOWFmYiIsImMiOjF9">
</iframe>
</div>
</main>

<footer class="footer">
© 2026 Ministerio de Educación – Desarrollado por <strong>Aneudy Minier</strong>
</footer>

<script>
const datosPorAnio = {
"2025-2026": {
informe: "https://app.powerbi.com/view?r=eyJrIjoiZWE0NjFhYWYtY2M5ZS00ZDQ4LWFiZDAtNmU1ZGZkYTVjNWViIiwidCI6IjY2ZTI4OThiLTJjMzUtNDMzZi1hNzUzLWJkNjRhY2EzOWFmYiIsImMiOjF9",
pruebas: {
septiembre: "https://drive.google.com/drive/folders/1DVgvr8SuIApyFKk2kQUaZjy2c736xGZh",
noviembre: "https://drive.google.com/drive/folders/1mHf3_gLi4ZIj_YLRPB0-CYh0b_Y1CMWV",
marzo: "https://drive.google.com/drive/folders/1JP1DCceZfuHuNL4FxIySqalPvCh36SAb",
mayo: ""
},
sistematizacion: {
septiembre: "https://lookerstudio.google.com/reporting/8b050392-1c17-4511-be16-64a07323885e",
noviembre: "https://lookerstudio.google.com/reporting/60bb48a6-a3df-45d9-ae1f-2a2272081fe4",
marzo: "https://lookerstudio.google.com/reporting/37283302-62a8-4a76-836d-2e484c186884",
mayo: ""
},
formularios: {
primerCiclo: "https://aminier06.github.io/formularioprimerciclo/",
segundoCiclo: "https://aminier06.github.io/formulariosegundociclo/"
}
},

"2026-2027": {
informe: "",
pruebas: {},
sistematizacion: {},
formularios: {}
}
};

let anioSeleccionado = "2025-2026";

function seleccionarAnio(anio) {
anioSeleccionado = anio;
document.getElementById("anioActualTexto").textContent = anio;

const url = datosPorAnio[anio].informe;
const visor = document.getElementById("visorInforme");

if (url) {
visor.src = url;
} else {
visor.src = "about:blank";
alert("No hay informe disponible aún.");
}

cerrarMenus();
}

function abrirRecurso(tipo, mes) {
const url = datosPorAnio[anioSeleccionado][tipo]?.[mes];

if (url) window.open(url, "_blank");
else alert("Recurso no disponible para este año.");

cerrarMenus();
}

function abrirFormulario(ciclo) {
const url = datosPorAnio[anioSeleccionado].formularios?.[ciclo];

if (url) window.open(url, "_blank");
else alert("Formulario no disponible.");

cerrarMenus();
}

function toggleMenu(id, e) {
e.stopPropagation();
const menu = document.getElementById(id);
cerrarMenus();
menu.classList.toggle("show");
}

function cerrarMenus() {
document.querySelectorAll(".dropdown-content").forEach(m => m.classList.remove("show"));
}

document.addEventListener("click", cerrarMenus);
</script>

</body>
</html>
